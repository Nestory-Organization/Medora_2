info:
  name: Analyze Symptoms - Headache & Fever (Success)
  description: Test symptom analysis with common symptoms
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:4000/api/ai/analyze-symptoms
  body:
    type: json
    data: |-
      {
        "symptoms": ["headache", "fever", "cough"],
        "duration": "3 days",
        "severity": 7,
        "age": 35,
        "medicalHistory": "none"
      }
  auth:
    type: bearer
    token: { { AI_JWT_TOKEN } }

script:
  post-response: |
    // Test: Status Code Check
    bru.expect(res.getStatus()).to.equal(200);

    // Parse response
    const body = res.getBody();
    bru.expect(body).to.have.property('success').to.equal(true);
    bru.expect(body).to.have.property('message');
    bru.expect(body).to.have.property('data');

    // Verify data structure
    const data = body.data;
    bru.expect(data).to.have.property('disclaimer');
    bru.expect(data).to.have.property('possibleConditions');
    bru.expect(data.possibleConditions).to.be.an('array');
    bru.expect(data.possibleConditions.length).to.be.greaterThan(0);

    // Verify condition structure
    const condition = data.possibleConditions[0];
    bru.expect(condition).to.have.property('condition');
    bru.expect(condition).to.have.property('confidence');
    bru.expect(condition).to.have.property('description');
    bru.expect(condition.confidence).to.be.a('number');
    bru.expect(condition.confidence).to.be.greaterThan(0);
    bru.expect(condition.confidence).to.be.lessThanOrEqual(100);

    // Verify recommendations
    bru.expect(data).to.have.property('recommendations');
    bru.expect(data.recommendations).to.be.an('array');

    console.log('✅ PASSED: Symptom analysis success');
    console.log('📋 Possible Conditions:');
    data.possibleConditions.forEach(c => {
      console.log(`  • ${c.condition} (${c.confidence}%)`);
    });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
