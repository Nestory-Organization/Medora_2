info:
  name: Recommend Specialist - Success
  description: Test specialist recommendation based on symptoms
  type: http
  seq: 5

http:
  method: POST
  url: http://localhost:4000/api/ai/recommend-specialist
  body:
    type: json
    data: |-
      {
        "symptoms": ["chest pain", "shortness of breath", "palpitations"],
        "conditions": []
      }
  auth:
    type: bearer
    token: { { AI_JWT_TOKEN } }

script:
  post-response: |
    // Test: Status Code Check
    bru.expect(res.getStatus()).to.equal(200);

    // Parse response
    const body = res.getBody();
    bru.expect(body).to.have.property('success').to.equal(true);
    bru.expect(body).to.have.property('data');

    // Verify data structure
    const data = body.data;
    bru.expect(data).to.have.property('disclaimer');
    bru.expect(data).to.have.property('specialtyRecommendations');
    bru.expect(data.specialtyRecommendations).to.be.an('array');
    bru.expect(data.specialtyRecommendations.length).to.be.greaterThan(0);
    bru.expect(data.specialtyRecommendations.length).to.be.lessThanOrEqual(5);

    // Verify specialty structure
    data.specialtyRecommendations.forEach(spec => {
      bru.expect(spec).to.have.property('specialty');
      bru.expect(spec).to.have.property('reason');
      bru.expect(spec).to.have.property('priority');
      bru.expect(['High', 'Medium', 'Low']).to.include(spec.priority);
    });

    // Save first specialist for reference
    if (data.specialtyRecommendations.length > 0) {
      bru.setVar('recommendedSpecialty', data.specialtyRecommendations[0].specialty);
    }

    console.log('✅ PASSED: Specialist recommendations received');
    console.log('👨‍⚕️  Recommended Specialist:');
    data.specialtyRecommendations.forEach(spec => {
      console.log(`  • ${spec.specialty} [${spec.priority}]`);
      console.log(`    Reason: ${spec.reason}`);
    });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
