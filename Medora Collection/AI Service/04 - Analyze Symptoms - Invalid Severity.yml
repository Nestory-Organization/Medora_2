info:
  name: Analyze Symptoms - Invalid Severity (Validation Error)
  description: Test validation error when severity is out of range
  type: http
  seq: 4

http:
  method: POST
  url: http://localhost:4000/api/ai/analyze-symptoms
  body:
    type: json
    data: |-
      {
        "symptoms": ["headache"],
        "duration": "2 days",
        "severity": 15,
        "age": 25
      }
  auth:
    type: bearer
    token: { { AI_JWT_TOKEN } }

script:
  post-response: |
    // Test: Status Code Check (should be 400)
    bru.expect(res.getStatus()).to.equal(400);

    // Parse response
    const body = res.getBody();
    bru.expect(body).to.have.property('success').to.equal(false);
    bru.expect(body).to.have.property('message');
    bru.expect(body.message).to.include('Severity');

    console.log('✅ PASSED: Validation error for invalid severity');
    console.log('⚠️  Error message:', body.message);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
