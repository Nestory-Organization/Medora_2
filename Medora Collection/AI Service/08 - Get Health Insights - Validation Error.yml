info:
  name: Get Health Insights - Invalid Age (Validation Error)
  description: Test validation error when age is invalid
  type: http
  seq: 8

http:
  method: POST
  url: http://localhost:4000/api/ai/health-insights
  body:
    type: json
    data: |-
      {
        "symptoms": ["fatigue"],
        "medicalHistory": "none",
        "age": 200
      }
  auth:
    type: bearer
    token: { { AI_JWT_TOKEN } }

script:
  post-response: |
    // Test: Status Code Check (should be 400)
    bru.expect(res.getStatus()).to.equal(400);

    // Parse response
    const body = res.getBody();
    bru.expect(body).to.have.property('success').to.equal(false);
    bru.expect(body.message).to.include('Age');

    console.log('✅ PASSED: Validation error for invalid age');
    console.log('⚠️  Error message:', body.message);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
