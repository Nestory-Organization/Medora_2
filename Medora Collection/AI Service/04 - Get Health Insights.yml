info:
  name: Get Health Insights - Success
  type: http
  seq: 4

http:
  method: POST
  url: http://localhost:4000/api/ai/health-insights
  body:
    type: json
    data: |-
      {
        "symptoms": ["fatigue", "low energy", "poor sleep"],
        "medicalHistory": "stress-related",
        "age": 40
      }
  auth:
    type: bearer
    token: { { AI_JWT_TOKEN } }

script:
  post-response: |
    bru.expect(res.getStatus()).to.equal(200);

    const body = res.getBody();
    bru.expect(body).to.have.property('success').to.equal(true);
    bru.expect(body).to.have.property('data');

    const data = body.data;
    bru.expect(data).to.have.property('lifestyleModifications').to.be.an('array');
    bru.expect(data).to.have.property('dietaryRecommendations').to.be.an('array');
    bru.expect(data).to.have.property('whenToSeekHelp');

    console.log('✅ PASSED: Health insights received');
    console.log('💪 Tips count:', data.lifestyleModifications.length);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
info:
  name: Get Health Insights - Success
  description: Test health insights and wellness recommendations
  type: http
  seq: 7

http:
  method: POST
  url: http://localhost:4000/api/ai/health-insights
  body:
    type: json
    data: |-
      {
        "symptoms": ["fatigue", "low energy", "poor sleep"],
        "medicalHistory": "stress-related issues",
        "age": 40
      }
  auth:
    type: bearer
    token: { { AI_JWT_TOKEN } }

script:
  post-response: |
    // Test: Status Code Check
    bru.expect(res.getStatus()).to.equal(200);

    // Parse response
    const body = res.getBody();
    bru.expect(body).to.have.property('success').to.equal(true);
    bru.expect(body).to.have.property('data');

    // Verify data structure
    const data = body.data;
    bru.expect(data).to.have.property('disclaimer');
    bru.expect(data).to.have.property('lifestyleModifications');
    bru.expect(data).to.have.property('dietaryRecommendations');
    bru.expect(data).to.have.property('exerciseSuggestions');
    bru.expect(data).to.have.property('preventiveMeasures');
    bru.expect(data).to.have.property('whenToSeekHelp');

    // Verify arrays
    bru.expect(data.lifestyleModifications).to.be.an('array');
    bru.expect(data.dietaryRecommendations).to.be.an('array');
    bru.expect(data.exerciseSuggestions).to.be.an('array');
    bru.expect(data.preventiveMeasures).to.be.an('array');

    console.log('✅ PASSED: Health insights retrieved');
    console.log('💪 Lifestyle Modifications:');
    data.lifestyleModifications.slice(0, 2).forEach(tip => {
      console.log(`  • ${tip}`);
    });
    console.log('🥗 Dietary Recommendations:');
    data.dietaryRecommendations.slice(0, 2).forEach(rec => {
      console.log(`  • ${rec}`);
    });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
