info:
  name: Analyze Symptoms - Missing JWT Token (Auth Error)
  description: Test authentication error when JWT token is missing
  type: http
  seq: 9

http:
  method: POST
  url: http://localhost:4000/api/ai/analyze-symptoms
  body:
    type: json
    data: |-
      {
        "symptoms": ["headache"],
        "duration": "1 day",
        "severity": 5,
        "age": 30
      }

script:
  post-response: |
    // Test: Status Code Check (should be 401)
    bru.expect(res.getStatus()).to.equal(401);

    // Parse response
    const body = res.getBody();
    bru.expect(body).to.have.property('success').to.equal(false);
    bru.expect(body.message).to.include('token');

    console.log('✅ PASSED: Authentication error for missing JWT');
    console.log('🔒 Error message:', body.message);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
