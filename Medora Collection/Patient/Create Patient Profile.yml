info:
  name: Create Patient Profile
  type: http
  seq: 4

http:
  method: POST
  url: http://localhost:4000/api/patients/patient/profile
  body:
    type: json
    data: |-
      {
        "userId": "{{userId}}",
        "email": "patient@example.com",
        "firstName": "John",
        "lastName": "Doe",
        "phone": "+1234567890",
        "dateOfBirth": "1995-05-12",
        "bloodType": "A+",
        "allergies": ["Pollen"],
        "medicalSummary": "Asthma with allergies",
        "chronicConditions": ["asthma"],
        "currentMedications": ["Albuterol inhaler"],
        "emergencyContact": {
          "name": "Jane Doe",
          "phone": "+1234567890",
          "relationship": "Sister"
        }
      }
  auth:
    type: bearer
    token: {{PATIENT_JWT_TOKEN}}

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

