info:
  name: Upload Invalid Document
  type: http
  seq: 13

http:
  method: POST
  url: http://localhost:4000/api/patients/patient/documents/upload
  body:
    type: multipartForm
    multipartForm:
      - name: file
        type: file
        value: ./invalid-file.exe
      - name: documentType
        value: lab_report
      - name: category
        value: blood-test
  auth:
    type: bearer
    token: { { PATIENT_JWT_TOKEN } }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
