info:
  name: Upload Invalid Document
  type: http
  seq: 13

http:
  method: POST
  url: http://localhost:4000/api/patients/patient/documents/upload
  body:
    type: multipartForm
    multipartForm:
      - name: file
        type: file
        value: ./invalid-file.exe
      - name: documentType
        value: lab_report
      - name: category
        value: blood-test
  auth:
    type: bearer
    token: { { PATIENT_JWT_TOKEN } }

script:
  post-response: |
    // Test: Status Code Check (Should be 400 for invalid file type)
    bru.expect(res.getStatus()).to.equal(400);

    // Test: Error Response
    const body = res.getBody();
    bru.expect(body).to.have.property('success').to.equal(false);
    bru.expect(body).to.have.property('message');
    bru.expect(body.message).to.match(/not allowed|invalid|unsupported/);

    console.log('✅ PASSED: Invalid document rejected');
    console.log('❌ Error:', body.message);
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
