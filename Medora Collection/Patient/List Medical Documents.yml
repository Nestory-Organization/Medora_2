info:
  name: List Medical Documents
  type: http
  seq: 6

http:
  method: GET
  url: http://localhost:4002/api/patients/documents?page=1&limit=10&documentType=lab_report
  auth:
    type: bearer
    token: {{PATIENT_JWT_TOKEN}}

script:
  post-response: |
    // Test: Status Code Check
    bru.expect(res.getStatus()).to.equal(200);
    
    // Test: Response Structure
    const body = res.getBody();
    bru.expect(body).to.have.property('success').to.equal(true);
    bru.expect(body).to.have.property('data');
    
    // Test: Pagination Fields
    bru.expect(body.data).to.have.property('documents');
    bru.expect(body.data).to.have.property('page').to.equal(1);
    bru.expect(body.data).to.have.property('limit');
    bru.expect(body.data).to.have.property('total');
    bru.expect(body.data).to.have.property('totalPages');
    
    // Test: Documents Array
    bru.expect(body.data.documents).to.be.an('array');
    
    // If documents exist, verify structure
    if (body.data.documents.length > 0) {
      const doc = body.data.documents[0];
      bru.expect(doc).to.have.property('_id');
      bru.expect(doc).to.have.property('documentType');
      bru.expect(doc).to.have.property('category');
    }
    
    console.log('✅ PASSED: Documents listed');
    console.log('📊 Total Documents:', body.data.total);
    console.log('📋 Documents on Page:', body.data.documents.length);
    
    // Save first document ID for subsequent requests
    if (body.data.documents.length > 0) {
      bru.setVar('documentId', body.data.documents[0]._id);
      console.log('💾 Saved documentId:', body.data.documents[0]._id);
    }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
