info:
  name: Get Patient Profile
  type: http
  seq: 3

http:
  method: GET
  url: http://localhost:4000/api/patients/patient/profile
  auth:
    type: bearer
    token: { { PATIENT_JWT_TOKEN } }

script:
  post-response: |
    // Test: Status Code Check
    bru.expect(res.getStatus()).to.equal(200);

    // Test: Response Structure
    const body = res.getBody();
    bru.expect(body).to.have.property('success').to.equal(true);
    bru.expect(body).to.have.property('data');

    // Test: Patient Profile Data
    const patient = body.data.patient;
    bru.expect(patient).to.have.property('_id');
    bru.expect(patient).to.have.property('firstName');
    bru.expect(patient).to.have.property('lastName');
    bru.expect(patient).to.have.property('email');
    bru.expect(patient).to.have.property('phone');
    bru.expect(patient).to.have.property('bloodType');
    bru.expect(patient).to.have.property('medicalSummary');
    bru.expect(patient).to.have.property('createdAt');

    // Save profile data
    bru.setVar('patientId', patient._id);

    console.log('✅ PASSED: Patient profile retrieved');
    console.log('👤 Name:', patient.firstName, patient.lastName);
    console.log('🩺 Blood Type:', patient.bloodType);
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
