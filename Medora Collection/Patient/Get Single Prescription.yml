info:
  name: Get Single Prescription
  type: http
  seq: 10

http:
  method: GET
  url: http://localhost:4000/api/patients/patient/prescriptions/{{prescriptionId}}
  auth:
    type: bearer
    token: { { PATIENT_JWT_TOKEN } }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
