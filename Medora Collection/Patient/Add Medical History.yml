info:
  name: Add Medical History
  type: http
  seq: 6

http:
  method: POST
  url: http://localhost:4000/api/patients/patient/history
  body:
    type: json
    data: |-
      {
        "patientId": "{{patientId}}",
        "title": "Follow-up visit",
        "description": "Routine asthma follow-up",
        "symptoms": ["Cough", "Mild wheezing"],
        "diagnosis": "Mild persistent asthma",
        "appointmentDate": "2026-04-02T10:30:00.000Z",
        "visitNotes": "Continue inhaler for 30 days"
      }
  auth:
    type: bearer
    token: { { PATIENT_JWT_TOKEN } }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
