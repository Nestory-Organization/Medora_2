info:
  name: Add Medical History
  type: http
  seq: 6

http:
  method: POST
  url: http://localhost:4000/api/patients/patient/history
  body:
    type: json
    data: |-
      {
        "patientId": "{{patientId}}",
        "title": "Follow-up visit",
        "description": "Routine asthma follow-up",
        "symptoms": ["Cough", "Mild wheezing"],
        "diagnosis": "Mild persistent asthma",
        "appointmentDate": "2026-04-02T10:30:00.000Z",
        "visitNotes": "Continue inhaler for 30 days"
      }
  auth:
    type: bearer
    token: { { PATIENT_JWT_TOKEN } }

script:
  post-response: |
    // Test: Status Code Check
    bru.expect(res.getStatus()).to.equal(201);

    // Test: Response Structure
    const body = res.getBody();
    bru.expect(body).to.have.property('success').to.equal(true);
    bru.expect(body).to.have.property('data');

    // Test: Medical History Fields
    const history = body.data.medicalHistory;
    bru.expect(history).to.have.property('_id');
    bru.expect(history).to.have.property('patientId');
    bru.expect(history).to.have.property('title');
    bru.expect(history).to.have.property('diagnosis');
    bru.expect(history).to.have.property('symptoms').to.be.an('array');

    // Save historyId for subsequent requests
    bru.setVar('historyId', history._id);

    console.log('✅ PASSED: Medical history added');
    console.log('📝 History ID:', history._id);
    console.log('🏥 Diagnosis:', history.diagnosis);
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
