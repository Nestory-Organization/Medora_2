info:
  name: Download Document
  type: http
  seq: 7

http:
  method: GET
  url: http://localhost:4002/api/patients/documents/{{documentId}}
  auth:
    type: bearer
    token: {{PATIENT_JWT_TOKEN}}

script:
  post-response: |
    // Test: Status Code Check
    bru.expect(res.getStatus()).to.equal(200);
    
    // Test: Response is file content or metadata
    const contentType = res.getHeader('content-type');
    bru.expect(contentType).to.be.ok;
    
    // Test: Content headers
    bru.expect(res.getHeader('content-disposition')).to.be.ok;
    
    console.log('✅ PASSED: Document downloaded');
    console.log('📥 Content-Type:', contentType);
    console.log('📦 Content-Length:', res.getHeader('content-length'));

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
