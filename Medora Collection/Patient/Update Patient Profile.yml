info:
  name: Update Patient Profile
  type: http
  seq: 5

http:
  method: PUT
  url: http://localhost:4000/api/patients/patient/profile
  body:
    type: json
    data: |-
      {
        "medicalSummary": "Patient has asthma and allergies",
        "chronicConditions": ["asthma"],
        "currentMedications": ["Albuterol inhaler"]
      }
  auth:
    type: bearer
    token: { { PATIENT_JWT_TOKEN } }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
