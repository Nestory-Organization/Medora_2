info:
  name: Update Patient Profile
  type: http
  seq: 5

http:
  method: PUT
  url: http://localhost:4000/api/patients/patient/profile
  body:
    type: json
    data: |-
      {
        "medicalSummary": "Patient has asthma and allergies",
        "chronicConditions": ["asthma"],
        "currentMedications": ["Albuterol inhaler"]
      }
  auth:
    type: bearer
    token: { { PATIENT_JWT_TOKEN } }

script:
  post-response: |
    // Test: Status Code Check
    bru.expect(res.getStatus()).to.equal(200);

    // Test: Response Structure
    const body = res.getBody();
    bru.expect(body).to.have.property('success').to.equal(true);
    bru.expect(body).to.have.property('data');

    // Test: Updated Fields
    const patient = body.data.patient;
    bru.expect(patient).to.have.property('_id');
    bru.expect(patient).to.have.property('medicalSummary');
    bru.expect(patient).to.have.property('chronicConditions').to.be.an('array');
    bru.expect(patient).to.have.property('currentMedications').to.be.an('array');
    bru.expect(patient).to.have.property('updatedAt');

    console.log('✅ PASSED: Patient profile updated');
    console.log('📋 Medical Summary:', patient.medicalSummary);
    console.log('💊 Medications:', patient.currentMedications.length);
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
