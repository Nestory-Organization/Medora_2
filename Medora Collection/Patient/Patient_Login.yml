info:
  name: Patient Login
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:4001/auth/login
  body:
    type: json
    data: |-
      {
        "email": "patient_test_123@test.com",
        "password": "Test@123"
      }
  auth: inherit

script:
  post-response: |
    // Test: Status Code Check
    bru.expect(res.getStatus()).to.equal(200);
    
    // Test: Response Structure
    const body = res.getBody();
    bru.expect(body).to.have.property('success').to.equal(true);
    bru.expect(body).to.have.property('data');
    bru.expect(body).to.have.property('message');
    
    // Test: User Data Validation
    bru.expect(body.data).to.have.property('user');
    bru.expect(body.data).to.have.property('token');
    
    const user = body.data.user;
    bru.expect(user).to.have.property('_id');
    bru.expect(user).to.have.property('email');
    bru.expect(user).to.have.property('role').to.equal('patient');
    
    // Test: Token Validation
    const token = body.data.token;
    bru.expect(token).to.be.a('string');
    bru.expect(token.length).to.be.greaterThan(0);
    bru.expect(token).to.match(/^eyJ/);
    
    // Capture variables for subsequent requests
    bru.setVar('userId', user._id);
    bru.setVar('PATIENT_JWT_TOKEN', token);
    
    console.log('✅ PASSED: Patient logged in successfully');
    console.log('👤 Email:', user.email);
    console.log('🔐 User ID:', user._id);
    console.log('💾 JWT Token captured');

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
