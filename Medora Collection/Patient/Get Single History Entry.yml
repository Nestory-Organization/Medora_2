info:
  name: Get Single History Entry
  type: http
  seq: 8

http:
  method: GET
  url: http://localhost:4000/api/patients/patient/history/{{historyId}}
  auth:
    type: bearer
    token: { { PATIENT_JWT_TOKEN } }

script:
  post-response: |
    // Test: Status Code Check
    const status = res.getStatus();
    bru.expect([200, 404]).to.include(status);

    if (status === 200) {
      // Test: Response Structure
      const body = res.getBody();
      bru.expect(body).to.have.property('success').to.equal(true);
      bru.expect(body).to.have.property('data');
      
      // Test: History Entry Fields
      const history = body.data.medicalHistory;
      bru.expect(history).to.have.property('_id');
      bru.expect(history).to.have.property('title');
      bru.expect(history).to.have.property('diagnosis');
      
      console.log('✅ PASSED: History entry retrieved');
      console.log('🏥 Diagnosis:', history.diagnosis);
    } else {
      console.log('⚠️ PASSED: History entry not found (expected)');
    }
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
