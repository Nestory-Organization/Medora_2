info:
  name: Create Telemedicine Session
  type: http
  seq: 5

http:
  method: POST
  url: http://localhost:4000/api/doctors/telemedicine/create-session
  body:
    type: json
    data: |-
      {
        "appointmentId": "your-appointment-id"
      }
  auth:
    type: bearer
    token: {{doctorToken}}

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
