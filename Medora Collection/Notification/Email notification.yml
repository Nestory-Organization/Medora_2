info:
  name: Email notification
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:4000/api/notifications/notify/email
  body:
    type: json
    data: |-
      {
        "to": "patient@example.com",
        "subject": "Appointment reminder",
        "text": "Your appointment is scheduled for tomorrow at 09:00."
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
