info:
  name: 02 - Send SMS
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:4000/api/notifications/notify/sms
  body:
    type: json
    data: |-
      {
        "to": "+94771234567",
        "message": "Your appointment is confirmed for tomorrow at 09:00."
      }
  auth:
    type: none

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
